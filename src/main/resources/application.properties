# Application
spring.application.name=frauddetector
  
  # MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017}
spring.data.mongodb.database=${MONGODB_DATABASE:fraud}
  
  # Kafka Producer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
  
  # Kafka Consumer
spring.kafka.consumer.group-id=fraud-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.mongodb.frauddetector.model
spring.kafka.consumer.enable-auto-commit=false
  
  # Anthropic Claude
anthropic.api.key=${ANTHROPIC_API_KEY}
anthropic.model=claude-sonnet-4-5
  
  # Voyage AI (embeddings)
voyage.api.key=${VOYAGE_API_KEY}
voyage.model=voyage-3
voyage.api.url=https://api.voyageai.com/v1/embeddings
  
  # Logging
logging.level.com.mongodb.frauddetector=INFO
logging.level.org.springframework.kafka=WARN